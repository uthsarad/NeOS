[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
# Sentinel: Relaxed global SigLevel to Required DatabaseOptional to support unsigned build repositories (like alci_repo), but official repos must explicitly override this to Required DatabaseRequired in the installed system config.
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional
# ⚡ Bolt: Increase parallel downloads to speed up installation/updates
ParallelDownloads = 8
# Size optimization: Exclude docs, non-English locales, and unneeded enterprise firmware
NoExtract = usr/share/doc/* usr/share/gtk-doc/*
NoExtract = usr/share/info/*
NoExtract = usr/share/help/*
NoExtract = usr/include/*
NoExtract = usr/share/locale/* !usr/share/locale/en* !usr/share/locale/locale.alias
NoExtract = usr/share/man/*
NoExtract = usr/lib/firmware/netronome/* usr/lib/firmware/liquidio/* usr/lib/firmware/qlogic/*
NoExtract = usr/lib/firmware/mellanox/* usr/lib/firmware/cxgb4/*
NoExtract = usr/lib/firmware/qed/* usr/lib/firmware/bnx2x/* usr/lib/firmware/bnx2/*
NoExtract = usr/lib/firmware/dpaa2/* usr/lib/firmware/cavium/* usr/lib/firmware/cnn55xx/*

# Arch Linux official repositories.
[core]
SigLevel = Required DatabaseOptional
Include = /etc/pacman.d/neos-mirrorlist

[extra]
SigLevel = Required DatabaseOptional
Include = /etc/pacman.d/neos-mirrorlist

[multilib]
SigLevel = Required DatabaseOptional
Include = /etc/pacman.d/neos-mirrorlist

[chaotic-aur]
Include = /etc/pacman.d/chaotic-mirrorlist

# Garuda repo: source of a current, actively-rebuilt Calamares (calamares-garuda
# provides 'calamares'). The ALCI calamares package has not been rebuilt since
# Feb 2025 and links the now-removed libyaml-cpp.so.0.8, so it fails to start on
# current Arch. Garuda's build tracks current Arch libs and pulls no qt6-webengine.
# Packages are signed by the Garuda signing key (TNE <tne@garudalinux.org>,
# 349BC7808577C592), which the build imports and locally signs before use, so we
# keep full signature verification here (no TrustAll).
[garuda]
SigLevel = Required DatabaseOptional
Server = https://builds.garudalinux.org/repos/$repo/$arch


