# MODULES
# The following modules are loaded before booting the system.
#
# This is a minimal, archiso-friendly mkinitcpio configuration with
# VM guest drivers included to ensure reliable boot on common hypervisors.
# ⚡ Bolt: Removed unsupported 'zfs' module to prevent mkinitcpio warnings.
# IMPORTANT: MODULES must stay on a SINGLE LINE. Calamares' initcpiocfg module
# rewrites the MODULES= line in the target with a line-based find/replace that
# assumes a one-line array. A multi-line array leaves the trailing module names
# behind as stray text, which mkinitcpio then tries to execute as shell commands
# ("virtio: command not found", etc.), failing the install.
#
# Grouped for reference (keep on one line):
#   QEMU/KVM virtio: virtio virtio_pci virtio_blk virtio_scsi virtio_net virtio_console virtio_balloon virtio_gpu
#   Hyper-V:         hv_vmbus hv_storvsc hv_netvsc hv_utils
#   VMware:          mptspi mptsas vmw_pvscsi vmw_vsock_vmci_transport vmxnet3 vmwgfx
#   VirtualBox:      vboxguest vboxsf vboxvideo
#   Generic/disk:    ahci libahci ata_piix sd_mod sr_mod nvme isofs btrfs
MODULES=(virtio virtio_pci virtio_blk virtio_scsi virtio_net virtio_console virtio_balloon virtio_gpu hv_vmbus hv_storvsc hv_netvsc hv_utils mptspi mptsas vmw_pvscsi vmw_vsock_vmci_transport vmxnet3 vmwgfx vboxguest vboxsf vboxvideo ahci libahci ata_piix sd_mod sr_mod nvme isofs btrfs)

# BINARIES
# This setting includes any additional binaries a given hook may need.
BINARIES=()

# FILES
# This setting is similar to BINARIES and allows you to add files to your
# image. Files listed in this setting will be added as is.
FILES=()

# HOOKS
# This setting is used to specify the order of hooks in the initramfs.
HOOKS=(base udev plymouth modconf kms memdisk archiso archiso_loop_mnt block filesystems keyboard)
