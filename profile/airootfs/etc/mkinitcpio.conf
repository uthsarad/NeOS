# MODULES
# The following modules are loaded before booting the system.
#
# This is a minimal, archiso-friendly mkinitcpio configuration with
# VM guest drivers included to ensure reliable boot on common hypervisors.
# ⚡ Bolt: Removed unsupported 'zfs' module to prevent mkinitcpio warnings.
MODULES=(
  # QEMU / KVM virtio drivers
  virtio
  virtio_pci
  virtio_blk
  virtio_scsi
  virtio_net
  virtio_console
  virtio_balloon
  virtio_gpu
  # Hyper-V
  hv_vmbus
  hv_storvsc
  hv_netvsc
  hv_utils
  # VMware — storage controllers MUST be here or the live CD / SCSI disk is
  # invisible in early boot, giving "NEOS_ISO did not show up". mptspi is
  # VMware Workstation's default LSI Logic controller; vmw_pvscsi is the
  # paravirtual controller; vmxnet3 = net, vmwgfx = graphics.
  mptspi
  mptsas
  vmw_pvscsi
  vmw_vsock_vmci_transport
  vmxnet3
  vmwgfx
  # VirtualBox
  vboxguest
  vboxsf
  vboxvideo
  # Generic storage + optical so the live medium is found on any hypervisor
  # and on bare metal regardless of controller type.
  ahci
  libahci
  ata_piix
  sd_mod
  sr_mod
  nvme
  isofs
  btrfs
)

# BINARIES
# This setting includes any additional binaries a given hook may need.
BINARIES=()

# FILES
# This setting is similar to BINARIES and allows you to add files to your
# image. Files listed in this setting will be added as is.
FILES=()

# HOOKS
# This setting is used to specify the order of hooks in the initramfs.
HOOKS=(base udev plymouth modconf kms memdisk archiso archiso_loop_mnt block filesystems keyboard)
