# NeOS Calamares Settings
---
modules-search: [ local ]

instances:
- id:       pacstrap
  module:   shellprocess
  config:   pacstrap.conf
- id:       cleanup
  module:   shellprocess
  config:   shellprocess.conf
# NOTE: the old 'liveuser' shellprocess instance (liveuser-setup.conf) was
# dropped when NeOS switched to a public multi-user installer (the Calamares
# 'users' page below creates the account). Its instance declaration was left
# behind by that change and is removed here so nothing can re-run the abandoned
# kiosk identity script.
- id:       unmountprep
  module:   shellprocess
  config:   unmount-prep.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - shellprocess@pacstrap
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - initcpiocfg
  - initcpio
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - grubcfg
  - bootloader
  - shellprocess@cleanup
  - shellprocess@unmountprep
  - umount
- show:
  - finished

branding: neos
prompt-install: true
dont-chroot: false
disable-cancel: false
disable-cancel-during-exec: false
hide-back-and-next-during-exec: false
quit-at-end: false
