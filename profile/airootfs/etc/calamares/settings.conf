# NeOS Calamares Settings
---
modules-search: [ local ]

instances:
- id:       pacstrap
  module:   shellprocess
  config:   pacstrap.conf
- id:       cleanup
  module:   shellprocess
  config:   shellprocess.conf
# NOTE: the old 'liveuser' kiosk installer path (liveuser-setup.conf +
# /usr/local/bin/neos-install-identity) was removed when NeOS switched to a
# public multi-user installer — the Calamares 'users' page below creates the
# account. Do not reintroduce a liveuser shellprocess instance: it imposed a
# passwordless autologin identity on installed disks
# (tests/verify_security_autologin.sh guards against regression).
- id:       unmountprep
  module:   shellprocess
  config:   unmount-prep.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - shellprocess@pacstrap
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - initcpiocfg
  - initcpio
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - grubcfg
  - bootloader
  - shellprocess@cleanup
  - shellprocess@unmountprep
  - umount
- show:
  - finished

branding: neos
prompt-install: true
dont-chroot: false
disable-cancel: false
disable-cancel-during-exec: false
hide-back-and-next-during-exec: false
quit-at-end: false
