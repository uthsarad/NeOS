# liveuser-setup.conf — configure the installed system for full live parity.
#
# Replaces the Calamares 'users' page (removed from the sequence): instead of
# asking for a username/password, NeOS installs a passwordless 'liveuser' that
# autologins straight into Plasma, mirroring the live ISO. All the logic lives
# in /usr/local/bin/neos-install-identity (delivered into the target by the
# overlay) so there is no fragile inline shell quoting here.
#
# Runs chrooted (dontChroot: false) AFTER the displaymanager module, which
# clears autologin when Calamares has no user — the script re-asserts it.
---
dontChroot: false
timeout: 120
script:
    - command: "/usr/local/bin/neos-install-identity"
      timeout: 120
