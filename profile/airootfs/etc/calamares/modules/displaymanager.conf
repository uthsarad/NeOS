# displaymanager.conf
---
displaymanagers:
  - sddm

# Default the installed system to the X11 Plasma session as well, so a machine
# whose GPU cannot start a Wayland session (which is why the live ISO hung) does
# not hit the same hang after install. Wayland remains selectable in SDDM.
defaultDesktopEnvironment:
    executable: "startplasma-x11"
    desktopFile: "plasmax11"

basicSetup: false
