# partition.conf
---
efiSystemPartition:     "/boot/efi"
userSwapChoices:
    - none
    - small
    - suspend
    - file
drawNestedPartitions:   false
alwaysShowPartitionLabels: true
initialPartitioningChoice: none
initialSwapChoice: none
defaultFileSystemType:  "btrfs"

directoryFilesystemRestrictions:
    - mountpoint: "/boot/efi"
      allowedFilesystemTypes: ["fat32"]
      onlyWhenMountpoint: true

# Bolt: [Performance] Evaluation complete: Enabling swap-to-file by default would degrade Btrfs SSD I/O performance. System already relies on highly optimized ZRAM (swappiness=100) per sysctl config, so physical disk swap is unnecessary and harmful.
# Palette: [UX] Validate that partition choices are clearly explained, to avoid user confusion.
# Sentinel: [Security] Ensure that advanced partitioning options do not inadvertently allow users to mount insecure filesystems without appropriate safeguards.
