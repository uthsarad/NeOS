# mount.conf - filesystem mounting and Btrfs subvolume layout
#
# Without this file the `mount` module created no Btrfs subvolumes, so a default
# install put / directly on the top-level subvolume and snapper snapshots of the
# root filesystem could not work despite Btrfs being the default and snapshots
# being a headline feature. This defines a snapper-compatible layout (root on @,
# /.snapshots on @.snapshots, plus @home/@cache/@log) so snapper can snapshot and
# roll back the system. The extraMounts block is the canonical upstream Calamares
# set of chroot bind mounts.
#
# NOTE: changing partitioning behaviour cannot be validated by the build/CI
# (which never performs an install); verify with a real Btrfs install before
# relying on snapshot rollback.
---
extraMounts:
    - device: proc
      fs: proc
      mountPoint: /proc
    - device: sys
      fs: sysfs
      mountPoint: /sys
    - device: /dev
      mountPoint: /dev
      options: [ bind ]
    - device: /dev/pts
      fs: devpts
      mountPoint: /dev/pts
    - device: tmpfs
      fs: tmpfs
      mountPoint: /run
    - device: /run/udev
      mountPoint: /run/udev
      options: [ bind ]

extraMountsEfi:
    - device: efivarfs
      fs: efivarfs
      mountPoint: /sys/firmware/efi/efivars

btrfsSubvolumes:
    - mountPoint: /
      subvolume: /@
    - mountPoint: /home
      subvolume: /@home
    - mountPoint: /var/cache
      subvolume: /@cache
    - mountPoint: /var/log
      subvolume: /@log
    - mountPoint: /.snapshots
      subvolume: /@.snapshots
