# unpackfs.conf
---
unpack:
    # Source is the squashfs IMAGE FILE, not the already-mounted
    # /run/archiso/airootfs directory. Calamares' unpackfs validates
    # `sourcefs` against ["file"] + /proc/filesystems; "directory" is NOT
    # a valid value and fails with "Bad unpackfs configuration ... not
    # supported by your current kernel". With sourcefs "squashfs" the .sfs
    # file is loop-mounted and rsynced. Path derives from archisobasedir
    # (install_dir=neos) + arch (x86_64); no copytoram in the boot entries,
    # so bootmnt stays mounted throughout the install.
    -   source: "/run/archiso/bootmnt/neos/x86_64/airootfs.sfs"
        sourcefs: "squashfs"
        destination: ""
        exclude:
            - "/etc/sudoers.d/zz-live-wheel"
            - "/etc/calamares"
            - "/etc/systemd/system/getty@tty1.service.d/autologin.conf"
            - "/etc/sddm.conf.d/autologin.conf"
            - "/etc/sddm.conf.d/00-allow-empty-password.conf"
            - "/etc/systemd/system/neos-liveuser-setup.service"
