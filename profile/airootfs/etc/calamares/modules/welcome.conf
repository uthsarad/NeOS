# welcome.conf
---
# Show the welcome-page info buttons. URLs come from branding.desc strings
# (supportUrl / knownIssuesUrl / releaseNotesUrl). Donate stays off (NeOS has
# no donation page; Calamares would otherwise fall back to the KDE donate URL).
showSupportUrl:         true
showKnownIssuesUrl:     true
showReleaseNotesUrl:    true
showDonateUrl:          false

geoip:
    style: "json"
    url: "https://ipapi.co/json"
    selector: "country_name"

requirements:
    requiredStorage:    20.0
    requiredRam:        2.0
    internetCheckUrl:   https://archlinux.org
    check:
        - storage
        - ram
        - power
        - internet
        - root
        - screen
    required:
        - internet
