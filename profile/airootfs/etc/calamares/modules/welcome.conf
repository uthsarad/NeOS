# welcome.conf
---
showSupportUrl:         true
showKnownIssuesUrl:     false
showReleaseNotesUrl:    false
geoip:
    style: "json"
    url: "https://ipapi.co/json"
    selector: "country_name"

requirements:
    requiredStorage:    20.0
    requiredRam:        2.0
    internetCheckUrl:   https://archlinux.org
    check:
        - storage
        - ram
        - power
        - internet
        - root
        - screen

# Palette: [UX] Consider adding localized welcome messages or simplified requirement checklists.
# Sentinel: [Security] Verify that internetCheckUrl does not leak sensitive telemetry data during ping.
