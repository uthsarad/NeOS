# shellprocess.conf — post-install setup (runs in the target chroot).
#
# Netinstall note: the target is a fresh pacstrap, NOT a copy of the live
# medium, so there is no live-only cruft (autologin drop-ins, the live user,
# the welcome app, /etc/calamares, the installer package) to strip out, and
# service enablement is handled by the services-systemd module. This step only
# does the genuine post-bootstrap setup pacstrap doesn't do itself.
---
dontChroot: false
timeout: 600
script:
    - command: "locale-gen"
    - command: "pacman-key --init"
    - command: "pacman-key --populate archlinux"
    - command: "bash -c 'pacman-key --populate chaotic 2>/dev/null || true'"
    - command: "mkdir -p /etc/pacman.d/hooks && cp -a /usr/share/neos/hooks/*.hook /etc/pacman.d/hooks/ 2>/dev/null || true"
