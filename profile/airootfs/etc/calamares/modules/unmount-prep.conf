# unmount-prep.conf — detach the target /dev tree on the host before the
# C++ `umount` module runs.
#
# The live host's /dev is a *shared* bind (mount.conf mounts it with
# `options: [ bind ]`), so the devpts that Calamares stacks on target/dev/pts
# joins /dev's propagation peer group and gets detached as a side effect. By the
# time the `umount` module walks the target mount table, target/dev/pts is
# already gone, so `umount` returns exit 32 ("not mounted") — which the umount
# module treats as fatal and aborts an otherwise-successful install
# ("Could not unmount target system.").
#
# Pre-clearing the /dev subtree here (lazy, recursive, best-effort) removes /dev
# and /dev/pts from the table so the umount module only handles the mounts that
# unmount cleanly (proc, sys, run, run/udev, the btrfs subvols and root).
#
# Runs on the live host (dontChroot) AFTER shellprocess@cleanup, which still
# chroots into the target (locale-gen, pacman-key) and therefore needs /dev.
# ${ROOT} is expanded by Calamares to the target mount point.
---
dontChroot: true
timeout: 60
script:
    - command: "/bin/sh -c 'umount -R -l ${ROOT}/dev 2>/dev/null || true; sync'"
