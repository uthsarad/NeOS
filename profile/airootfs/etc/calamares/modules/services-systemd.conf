---
services:
  - name: "NetworkManager"
    action: "enable"
  - name: "bluetooth"
    action: "enable"
  - name: "sddm"
    action: "enable"
  - name: "neos-autoupdate.timer"
    action: "enable"
  - name: "neos-driver-manager"
    action: "enable"
  - name: "neos-vm-graphics"
    action: "enable"
  - name: "fstrim.timer"
    action: "enable"
  - name: "ufw"
    action: "enable"
  - name: "cups"
    action: "enable"
  - name: "thermald"
    action: "enable"
  - name: "ModemManager"
    action: "enable"

# Default the installed system to graphical.target so it boots into SDDM/Plasma
# instead of a text login on tty1. Without this the netinstalled system has no
# explicit default target and can come up in multi-user (text) mode.
targets:
  - name: "graphical"
    mandatory: true
