# pacstrap.conf — NeOS netinstall: bootstrap the base system from the repos.
#
# Replaces the live-clone 'unpackfs' module. Runs on the live host (dontChroot)
# so pacstrap can install INTO the freshly mounted target. ${ROOT} is expanded
# by Calamares to the installation root mount point.
---
dontChroot: true
timeout: 3600
script:
    - command: "/usr/local/bin/neos-pacstrap ${ROOT}"
      timeout: 3600
