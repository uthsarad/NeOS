# users.conf
---
defaultGroups:
    - name: users
      must_exist: true
      system: true
    - name: wheel
      must_exist: false
      system: true
    - name: video
      must_exist: false
      system: true
    - name: audio
      must_exist: false
      system: true
    - name: storage
      must_exist: false
      system: true
    - name: power
      must_exist: false
      system: true
    - name: input
      must_exist: false
      system: true
    - name: network
      must_exist: false
      system: true
    - name: lp
      must_exist: false
      system: true

autologinGroup: autologin
doAutologin: false

sudoersGroup: wheel
sudoersConfigureWithGroup: true
setRootPassword: false
doReusePassword: false

passwordRequirements:
    minLength: 6

user:
  shell: /bin/zsh
  forbidden_names: [ root ]

hostname:
  location: EtcFile
  writeHostsFile: true
  template: "neos-${cpu}"

presets:
    fullName:
        editable: true
    loginName:
        editable: true
