# Force SDDM (greeter and default) onto X11 rather than Wayland.
#
# The live session previously ran Plasma on Wayland with no X11 session even
# installed. Wayland is the least portable path across GPUs (notably NVIDIA /
# nouveau and some VMs): when it cannot start, autologin fails silently and boot
# hangs at "Terminate Plymouth Boot Screen". X11 boots on virtually all hardware,
# which is what a live installer ISO needs. Users can still pick a Wayland session
# from the SDDM session menu where their hardware supports it.
[General]
DisplayServer=x11
