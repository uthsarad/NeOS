# Live-session autologin.
#
# Session MUST be the X11 Plasma session (plasmax11 -> /usr/share/xsessions/
# plasmax11.desktop, from plasma-x11-session), NOT the Wayland session
# (plasma -> /usr/share/wayland-sessions/plasma.desktop).
#
# Why: KWin on Wayland has no uncomposited mode. On a GPU where Wayland cannot
# get hardware GL (marginal/hybrid GPUs, NVIDIA/nouveau, VMs without 3D) it
# composites through llvmpipe; the desktop paints once but input is never
# serviced, so the *mouse cursor freezes / gets stuck* and buttons appear dead.
# X11 KWin degrades to a plain, GL-free window manager instead and stays
# responsive on software rendering. This matches the project's X11-everywhere
# decision (sddm.conf.d/10-displayserver.conf forces the greeter to X11 and
# modules/displaymanager.conf defaults the installed system to startplasma-x11).
# Wayland stays selectable from the SDDM session menu where the GPU supports it.
[Autologin]
User=liveuser
Session=plasmax11
