[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
# Required = packages must be signed (security kept). DatabaseOptional, NOT
# DatabaseRequired: Arch's official repos (core/extra/multilib) do not sign
# their databases, so demanding a .db.sig makes pacman 404 on core.db.sig etc.
# and the install/pacstrap fails to synchronize databases.
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional
ParallelDownloads = 8
Color
VerbosePkgLists
ILoveCandy

[core]
Include = /etc/pacman.d/neos-mirrorlist

[extra]
Include = /etc/pacman.d/neos-mirrorlist

[multilib]
Include = /etc/pacman.d/neos-mirrorlist

[chaotic-aur]
Include = /etc/pacman.d/chaotic-mirrorlist
