INCLUDE archiso_head.cfg

LABEL neos64_pxe
TEXT HELP
Boot NeOS using PXE.
It allows you to install NeOS or perform system maintenance.
ENDTEXT
MENU LABEL Boot NeOS (x86_64, PXE)
LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-lts
INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% ip=:: cow_spacesize=4G quiet splash
SYSAPPEND 3

INCLUDE archiso_tail.cfg
