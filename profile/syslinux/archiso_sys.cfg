INCLUDE archiso_head.cfg

LABEL neos64
TEXT HELP
Start the NeOS installer media and install NeOS to a hard drive.
ENDTEXT
MENU LABEL Install NeOS (x86_64)
LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-lts
INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G quiet splash

LABEL neos64_nomodeset
TEXT HELP
Boot the NeOS installer media with basic graphics drivers (nomodeset).
Use this option if you encounter screen issues during boot.
ENDTEXT
MENU LABEL Install NeOS (x86_64, safe graphics)
LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-lts
INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G nomodeset


INCLUDE archiso_tail.cfg
