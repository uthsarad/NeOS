INCLUDE archiso_head.cfg

LABEL neos64
TEXT HELP
Boot NeOS with the LTS kernel. Recommended for most hardware.
ENDTEXT
MENU LABEL NeOS (LTS Kernel)
LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-lts
INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G quiet splash loglevel=3 systemd.show_status=auto rd.udev.log_level=3

LABEL neos64_nomodeset
TEXT HELP
Boot with basic graphics drivers. Use if you see display issues.
ENDTEXT
MENU LABEL NeOS (Safe Graphics)
LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-lts
INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G nomodeset loglevel=3

LABEL neos64_a11y
TEXT HELP
Boot with accessibility features enabled for screen readers.
ENDTEXT
MENU LABEL NeOS (Accessibility)
LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-lts
INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G quiet splash accessibility=on

INCLUDE archiso_tail.cfg
