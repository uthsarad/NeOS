# NeOS Linux GRUB Configuration

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod all_video
insmod font
insmod gfxmenu
insmod gfxterm
insmod png

if [ -f "$prefix/themes/starfield/theme.txt" ]; then
    # Fonts and the PNG module must be loaded BEFORE `set theme`: GRUB does not
    # auto-load a theme's fonts/images, so without this the starfield menu
    # renders blank or garbled. starfield bundles its own DejaVu .pf2 fonts.
    loadfont $prefix/themes/starfield/dejavu_10.pf2
    loadfont $prefix/themes/starfield/dejavu_12.pf2
    loadfont $prefix/themes/starfield/dejavu_14.pf2
    loadfont $prefix/themes/starfield/dejavu_bold_14.pf2
    set gfxmode=auto
    terminal_output gfxterm
    set theme=$prefix/themes/starfield/theme.txt
fi

# Windows-11-style: boot straight into the splash with no visible menu wait.
# The menu is still reachable by holding ESC/SHIFT (or F8) during boot.
set timeout=0
set timeout_style=hidden
set default=0

menuentry "NeOS (LTS Kernel)" --class neos --class linux {
    search --no-floppy --set=root --label NEOS_ISO
    linux /neos/boot/x86_64/vmlinuz-linux-lts archisobasedir=neos archisolabel=NEOS_ISO cow_spacesize=4G copytoram=n nouveau.modeset=1 radeon.modeset=1 i915.modeset=1 nvme_load=yes quiet splash loglevel=3 systemd.show_status=auto rd.udev.log_level=3
    initrd /neos/boot/x86_64/initramfs-linux-lts.img
}

menuentry "NeOS (Safe Graphics)" --class neos --class linux {
    search --no-floppy --set=root --label NEOS_ISO
    linux /neos/boot/x86_64/vmlinuz-linux-lts archisobasedir=neos archisolabel=NEOS_ISO cow_spacesize=4G nomodeset loglevel=3
    initrd /neos/boot/x86_64/initramfs-linux-lts.img
}

menuentry "NeOS (Accessibility - Speech)" --class neos --class linux {
    search --no-floppy --set=root --label NEOS_ISO
    linux /neos/boot/x86_64/vmlinuz-linux-lts archisobasedir=neos archisolabel=NEOS_ISO cow_spacesize=4G quiet splash accessibility=on
    initrd /neos/boot/x86_64/initramfs-linux-lts.img
}

