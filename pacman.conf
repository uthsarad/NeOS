[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
# Sentinel: Relaxed global SigLevel to Required DatabaseOptional to support unsigned build repositories (like alci_repo), but official repos must explicitly override this to Required DatabaseRequired in the installed system config.
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional
# ⚡ Bolt: Increase parallel downloads to speed up installation/updates
ParallelDownloads = 8
# 🗑️ Size optimization: Exclude docs, man pages, and locales
NoExtract = usr/share/man/* usr/share/doc/* usr/share/gtk-doc/*
NoExtract = usr/share/locale/*
NoExtract = usr/share/info/*
NoExtract = usr/share/help/*
NoExtract = usr/include/*

# Arch Linux official repositories.
[core]
SigLevel = Required DatabaseOptional
Include = /etc/pacman.d/neos-mirrorlist

[extra]
SigLevel = Required DatabaseOptional
Include = /etc/pacman.d/neos-mirrorlist

[multilib]
SigLevel = Required DatabaseOptional
Include = /etc/pacman.d/neos-mirrorlist

[chaotic-aur]
Include = /etc/pacman.d/chaotic-mirrorlist

[alci_repo]
# Sentinel: TrustAll removed. Unsigned repo requires Optional.
SigLevel = Optional
Server = https://arch-linux-calamares-installer.github.io/$repo/$arch
