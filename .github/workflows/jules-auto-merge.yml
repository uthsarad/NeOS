name: Auto-merge Jules

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  approve-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      workflows: write
    # SECURITY: The `workflows: write` permission is granted here to allow auto-merging PRs that modify workflow files.
    # It is strictly coupled with this `if` condition to prevent untrusted actors from leveraging the auto-merge bot
    # to execute unauthorized merges or alter repository configurations. Do NOT remove this condition.
    if: github.actor == github.repository_owner || github.actor == 'google-labs-jules[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr ready "$PR_URL" || true
          gh pr merge "$PR_URL" --auto --squash --delete-branch
