name: Auto-merge Jules

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  approve-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      workflows: write
    # SECURITY: The `workflows: write` permission is granted to allow the bot to auto-merge PRs that modify workflows.
    # This `if` condition MUST be preserved to prevent unauthorized actors from exploiting this permission to execute arbitrary code or alter repository configurations.
    if: github.actor == github.repository_owner || github.actor == 'google-labs-jules[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr ready "$PR_URL" || true
          gh pr merge "$PR_URL" --auto --squash --delete-branch
