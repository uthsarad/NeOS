name: Auto-merge Jules

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  approve-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      workflows: write
    if: >-
      github.event.pull_request.user.login == 'google-labs-jules[bot]' ||
      github.actor == github.repository_owner
    steps:
      - name: Auto-merge
        # Bolt: Removed actions/checkout as the gh CLI is API-driven and does not need local repo context
        env:
          GH_TOKEN: ${{ secrets.JULES_AUTO_MERGE_TOKEN != '' && secrets.JULES_AUTO_MERGE_TOKEN || secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          HAS_PAT: ${{ secrets.JULES_AUTO_MERGE_TOKEN != '' }}
        run: |
          set -euo pipefail

          # If the PR changes workflow files, GitHub may reject merge operations from GITHUB_TOKEN
          # because app tokens do not have workflow scope. Use JULES_AUTO_MERGE_TOKEN for these PRs.
          if gh pr view "$PR_URL" --json files --jq '.files[].path' | grep -q '^.github/workflows/'; then
            if [[ "$HAS_PAT" != "true" && "${{ github.actor }}" != "google-labs-jules[bot]" ]]; then
              echo "PR modifies .github/workflows/* and requires secret JULES_AUTO_MERGE_TOKEN (repo + workflow scopes) for auto-merge." >&2
              exit 1
            fi
          fi

          gh pr review "$PR_URL" --approve || true
          gh pr ready "$PR_URL" || true
          gh pr merge "$PR_URL" --auto --squash --delete-branch
