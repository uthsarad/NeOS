name: Auto-merge Jules

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  approve-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      workflows: write
    # Security: Only allow the repository owner and trusted bots to execute the auto-merge workflow
    if: github.actor == github.repository_owner || github.actor == 'google-labs-jules[bot]'
    steps:
      - name: Auto-merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr ready "$PR_URL" || true
          gh pr merge "$PR_URL" --auto --squash --delete-branch
