name: Build NeOS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-iso-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm git wget awk grep syslinux python rust python-yaml shellcheck trivy

      - name: Validate PyYAML Installation
        run: |
          set -euo pipefail
          echo "::group::🐍 Validating PyYAML"
          python -c "import yaml; print('PyYAML version:', yaml.__version__)"
          echo "::endgroup::"

      - name: Run pre-build validations
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          shopt -s nullglob
          FAILED=0

          for script in tests/verify_*.sh; do
            # *iso* tests need a built image; they run in the build job
            # ("Validate ISO" step) after mkarchiso produces one.
            if [[ "$script" == *iso* ]]; then
              continue
            fi

            echo "::group::Running $script..."

            if ! timeout 120s bash "$script"; then
              echo "::error::Test failed: $script"
              FAILED=1
            fi
            echo "::endgroup::"
          done

          if (( FAILED )); then
            echo "::error::One or more pre-build validations failed"
            exit 1
          fi

      - name: Run Security Scans
        run: |
          set -euo pipefail
          echo "=============================="
          echo "🛡️ Initiating Security Scans"
          echo "=============================="
          echo ""

          echo "Running ShellCheck..."
          find . -type f -name '*.sh' -print0 | xargs -0 -r shellcheck
          echo "✅ ShellCheck completed successfully."
          echo ""

          echo "::group::🛡️ Trivy Vulnerability Scan"
          trivy fs --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed ./
          echo "✅ Trivy vulnerability scan completed successfully."
          echo ""

          echo "=============================="
          echo "🎉 All Security Scans Passed!"
          echo "=============================="

  build:
    needs: test

    runs-on: ubuntu-latest

    container:
      image: archlinux:latest
      options: --privileged

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          set -euo pipefail

          pacman-key --init
          pacman-key --populate archlinux

          pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 3056513887B78AEB

          # Garuda signing key (signs calamares-garuda in the [garuda] repo)
          pacman-key --recv-key 349BC7808577C592 --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 349BC7808577C592

          pacman -U --noconfirm \
            'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-keyring.pkg.tar.zst'

          pacman -Sy --noconfirm \
            --overwrite='/usr/lib/libgcc*' \
            --overwrite='/usr/lib/libstdc++*' \
            --overwrite='/usr/share/licenses/gcc-libs/*' \
            archiso \
            git \
            wget \
            squashfs-tools \
            grub \
            syslinux \
            rust \
            qemu-system-x86 \
            qemu-img \
            util-linux

      - name: Prepare Build Config
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"

          # Shared with build.sh — tools/gen-build-conf.sh is the single
          # source of truth for the build pacman.conf logic.
          bash tools/gen-build-conf.sh "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/pacman-build.conf"

          echo "Generated pacman-build.conf:"
          cat "$GITHUB_WORKSPACE/pacman-build.conf"

      - name: Generate netinstall manifests
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"

          # CRITICAL: without this the ISO ships the stale committed
          # neos-packages.txt / neos-overlay.txt, and systems installed from a
          # CI ISO silently miss newer overlay files and packages.
          bash tools/gen-manifests.sh "$GITHUB_WORKSPACE"

      - name: Build ISO
        run: |
          set -euo pipefail

          PROFILE_DIR="$GITHUB_WORKSPACE/profile"
          PACMAN_CONF="$GITHUB_WORKSPACE/pacman-build.conf"
          WORK_DIR="$GITHUB_WORKSPACE/work"
          OUT_DIR="$GITHUB_WORKSPACE/out"

          echo "PROFILE_DIR=$PROFILE_DIR"
          echo "PACMAN_CONF=$PACMAN_CONF"

          if [[ -z "$PROFILE_DIR" ]]; then
            echo "PROFILE_DIR is empty" >&2
            exit 1
          fi

          if [[ ! -f "$PACMAN_CONF" ]]; then
            echo "Missing pacman config at $PACMAN_CONF" >&2
            exit 1
          fi

          if [[ ! -f "$PROFILE_DIR/profiledef.sh" ]]; then
            echo "Missing profiledef.sh in $PROFILE_DIR" >&2
            exit 1
          fi

          set +e +o pipefail
          yes "" | mkarchiso -v \
            -C "$PACMAN_CONF" \
            -w "$WORK_DIR" \
            -o "$OUT_DIR" \
            "$PROFILE_DIR"
          MKARCHISO_EXIT=${PIPESTATUS[1]:-$?}
          set -e -o pipefail

          if [[ "$MKARCHISO_EXIT" -ne 0 ]]; then
            echo "::error::mkarchiso failed with exit code $MKARCHISO_EXIT"
            exit "$MKARCHISO_EXIT"
          fi

      - name: Combine ISO parts if split
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE/out" || exit 1

          shopt -s nullglob

          parts=(neos-*.iso.part*)

          if (( ${#parts[@]} > 0 )); then
            echo "Found ISO part files, combining them..."

            base_name="${parts[0]%.part*}"

            echo "Combining into: $base_name"

            printf '%s\n' "${parts[@]}" | sort -V | xargs cat > "$base_name"

            echo "Combined ISO created: $base_name"

            ls -lh "$base_name"

            rm -f "${parts[@]}"
          else
            echo "No split ISO parts found, using existing ISO file"
          fi

          ls -lh

      - name: Validate ISO
        run: |
          cd "$GITHUB_WORKSPACE"

          bash tests/verify_iso_grub.sh
          bash tests/verify_iso_size.sh
          REQUIRE_ISO=1 bash tests/verify_iso_calamares_libs.sh
          bash tests/verify_iso_smoketest.sh

      - name: Validate ISO Size
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"

          shopt -s nullglob

          files=(out/*.iso)
          ISO_FILE="${files[0]:-}"

          if [[ -z "$ISO_FILE" ]]; then
            echo "❌ No ISO file found to validate"
            exit 1
          fi

          ISO_SIZE=$(stat -c%s "$ISO_FILE")
          MAX_SIZE=$((2 * 1024 * 1024 * 1024))

          printf -v ISO_SIZE_MB "%d.%02d" \
            "$((ISO_SIZE / 1048576))" \
            "$(((ISO_SIZE % 1048576) * 100 / 1048576))"

          printf -v MAX_SIZE_MB "%d.%02d" \
            "$((MAX_SIZE / 1048576))" \
            "$(((MAX_SIZE % 1048576) * 100 / 1048576))"

          echo "ISO File: $ISO_FILE"
          echo "ISO Size: $ISO_SIZE bytes (${ISO_SIZE_MB} MiB)"
          echo "Max Size: $MAX_SIZE bytes (${MAX_SIZE_MB} MiB)"

          if (( ISO_SIZE >= MAX_SIZE )); then
            EXCESS_SIZE=$((ISO_SIZE - MAX_SIZE))

            printf -v EXCESS_SIZE_MB "%d.%02d" \
              "$((EXCESS_SIZE / 1048576))" \
              "$(((EXCESS_SIZE % 1048576) * 100 / 1048576))"

            echo "❌ ISO exceeds GitHub release limit by ${EXCESS_SIZE_MB} MiB!"
            echo ""
            echo "💡 How to fix:"
            echo "   - Review 'packages.x86_64' and remove unnecessary dependencies."
            echo "   - Utilize 'NoExtract' rules in 'pacman.conf'."
            echo "   - Check for large unintended assets in 'airootfs/'."
            echo "   - Consult DEEP_AUDIT.md for more size reduction strategies."

            exit 1
          else
            echo "✅ ISO size is within limits."
          fi

      - name: Prepare ISO for upload
        id: iso
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"

          shopt -s nullglob

          files=(out/*.iso)
          ISO_FILE="${files[0]:-}"

          ISO_SIZE=$(stat -c%s "$ISO_FILE")

          printf -v ISO_SIZE_MB "%d.%02d" \
            "$((ISO_SIZE / 1048576))" \
            "$(((ISO_SIZE % 1048576) * 100 / 1048576))"

          echo "ISO size: $ISO_SIZE bytes (${ISO_SIZE_MB} MiB)"

          ls -lh out/

      - name: Generate VM Appliance Templates
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          chmod +x tools/gen-vm-appliance.sh
          ./tools/gen-vm-appliance.sh

      - name: Generate checksums
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE/out"
          sha256sum -- *.iso > SHA256SUMS
          cat SHA256SUMS

      - name: Generate release tag and notes
        id: tag
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"

          # Tag from the repo VERSION file so releases map to CHANGELOG
          # entries; the run number suffix keeps same-day rebuilds unique.
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "value=v${VERSION}-b${{ github.run_number }}" >> "$GITHUB_OUTPUT"

          # Release body = the CHANGELOG section for this VERSION (empty file
          # if the section is missing; generate_release_notes still fills in
          # the commit list).
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            /^## \[/ { flag = 0 }
            flag { print }
          ' CHANGELOG.md > release-body.md

          echo "Release body:"
          cat release-body.md

      - name: Upload ISO and VM Templates to Release
        uses: softprops/action-gh-release@v3
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: NeOS ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          body_path: release-body.md
          files: |
            out/*.iso
            out/SHA256SUMS
            out/vm/*
